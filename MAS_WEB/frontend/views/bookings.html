<div class="table-container glass-panel wow-card full-width">
    <div class="card-header">
        <h2><i class="fa-solid fa-calendar-check"></i> إدارة المواعيد والحجوزات</h2>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="fetchBookings()">
                <i class="fa-solid fa-sync"></i> تحديث القائمة
            </button>
        </div>
    </div>
    
    <div class="filter-row mb-2" style="padding: 1rem; display: flex; gap: 1rem; align-items: center;">
        <span style="font-size: 0.85rem; color: var(--text-muted);">تصفية حسب الحالة:</span>
        <button class="btn-chip active" onclick="filterBookings('all')">الكل</button>
        <button class="btn-chip" onclick="filterBookings('PENDING')">قيد الانتظار</button>
        <button class="btn-chip" onclick="filterBookings('CONFIRMED')">مؤكد</button>
        <button class="btn-chip" onclick="filterBookings('REJECTED')">مرفوض</button>
    </div>

    <div class="table-responsive" id="bookingsList">
        <div class="loader">جاري تحميل المواعيد...</div>
    </div>
</div>

<style>
.btn-chip {
    padding: 0.4rem 1.2rem;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-glass);
    color: var(--text-muted);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.3s ease;
}
.btn-chip.active {
    background: var(--accent-main);
    color: white;
    border-color: var(--accent-main);
    box-shadow: 0 4px 12px rgba(176, 0, 73, 0.3);
}
.booking-status {
    padding: 0.25rem 0.75rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 700;
}
.status-pending { background: rgba(250, 204, 21, 0.1); color: #facc15; }
